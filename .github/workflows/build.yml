name: Build Exoua

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Run Lua entry
        run: lua main.lua

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust (if present)
        run: cargo build

      - name: Run Rust binary
        run: cargo run

      - name: List generated files
        run: ls -la

      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: exoua-output
          path: |
            *.exolvl
            *.json
            output/**
